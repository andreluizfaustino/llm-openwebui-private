<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Private AI Workspace{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f0f9ff', 500: '#0ea5e9', 700: '#0369a1' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900 antialiased">
  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-3">
    <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
      </svg>
    </div>
    <span class="font-semibold text-gray-800">Private AI Workspace</span>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
